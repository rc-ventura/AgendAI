version: "1"

# AgendAI — Render Blueprint (Fase 1)
# Todos os serviços são type:web (free tier — pserv requer plano pago).
# nginx é o único ponto de entrada recomendado para o usuário final.
# api e agent-ui-pro têm URLs públicas mas são acessados internamente pelo nginx.
#
# Antes de fazer deploy:
# 1. Crie os recursos externos (ver README.md nesta pasta)
# 2. Defina as env vars marcadas com sync: false no Render Dashboard
# 3. O deploy é disparado automaticamente pelo .github/workflows/deploy.yml

services:

  # ── nginx — ponto de entrada principal para o usuário ────────────────────────
  - type: web
    name: agendai-nginx
    runtime: docker
    dockerfilePath: ./nginx/Dockerfile
    dockerContext: ./nginx
    envVars:
      - key: LANGGRAPH_AUTH_TOKEN
        sync: false
    healthCheckPath: /health
    autoDeployTrigger: off

  # ── API Express (Node.js) ────────────────────────────────────────────────────
  - type: web
    name: agendai-api
    runtime: docker
    dockerfilePath: ./api/Dockerfile
    dockerContext: ./api
    envVars:
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        sync: false   # Neon: postgres://...@.../agendai_app?sslmode=require
    healthCheckPath: /horarios/disponiveis
    autoDeployTrigger: off

  # ── LangGraph Server ─────────────────────────────────────────────────────────
  # Imagem publicada no GHCR pelo deploy.yml via: langgraph build
  - type: web
    name: agendai-langgraph
    runtime: image
    image:
      url: ghcr.io/rc-ventura/agendai-agent:latest
    envVars:
      - key: PORT
        value: "8123"
      - key: HOST
        value: "0.0.0.0"
      - key: DATABASE_URI
        sync: false   # Neon: postgres://...@.../agendai_lg?sslmode=require
      - key: REDIS_URI
        sync: false   # Upstash: rediss://default:xxx@xxx.upstash.io:6379
      - key: LANGSMITH_API_KEY
        sync: false   # license + tracing key (Developer plan)
      - key: LANGSMITH_TRACING
        value: "true"
      - key: LANGSMITH_PROJECT
        value: AgendAI
      - key: OPENAI_API_KEY
        sync: false
      - key: API_BASE_URL
        value: http://agendai-api:3000   # hostname interno do Render (mesmo nome do serviço)
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
    autoDeployTrigger: off

  # ── Chat UI Next.js ──────────────────────────────────────────────────────────
  - type: web
    name: agendai-ui
    runtime: docker
    dockerfilePath: ./agent-ui-pro/Dockerfile
    dockerContext: ./agent-ui-pro
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: ""                # vazio = same-origin (nginx serve a UI)
      - key: NEXT_PUBLIC_ASSISTANT_ID
        value: agendai_agent
      - key: NEXT_PUBLIC_LANGGRAPH_API_KEY
        sync: false              # mesmo valor do LANGGRAPH_AUTH_TOKEN
    autoDeployTrigger: off

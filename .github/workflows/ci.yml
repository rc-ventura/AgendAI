name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test-api:
    name: API — Jest (Postgres)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: agendai
          POSTGRES_PASSWORD: agendai
          POSTGRES_DB: agendai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: cd api && npm ci

      - name: Run tests
        env:
          DATABASE_URL: postgres://agendai:agendai@localhost:5432/agendai_test
          NODE_ENV: test
        run: cd api && npm test

  test-agent:
    name: Agent — pytest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Run tests
        run: cd agent && uv run --extra dev pytest --tb=short

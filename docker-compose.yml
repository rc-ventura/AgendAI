version: '3.8'

services:
  api:
    build: ./api
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=3000
      - DB_PATH=/app/data/clinica.db
    restart: unless-stopped
    networks:
      - agendai-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/horarios/disponiveis"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  agent:
    build: ./agent
    ports:
      - "127.0.0.1:8123:8123"  # só localhost — LangGraph Studio; externo usa nginx:8080
    env_file: .env
    environment:
      - API_BASE_URL=http://api:3000
      - LANGGRAPH_AUTH_TOKEN=${LANGGRAPH_AUTH_TOKEN}
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - agendai-network

  nginx:
    build: ./nginx
    ports:
      - "8080:8080"
    environment:
      - LANGGRAPH_AUTH_TOKEN=${LANGGRAPH_AUTH_TOKEN}
    depends_on:
      - agent
    restart: unless-stopped
    networks:
      - agendai-network

  agent-ui-pro:
    build:
      context: ./agent-ui-pro
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
        NEXT_PUBLIC_ASSISTANT_ID: agendai_agent
        NEXT_PUBLIC_LANGGRAPH_API_KEY: ${LANGGRAPH_AUTH_TOKEN}
    ports:
      - "3002:3002"
    depends_on:
      - nginx
    restart: unless-stopped
    networks:
      - agendai-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  agendai-network:
    driver: bridge
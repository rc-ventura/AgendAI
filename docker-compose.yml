
# ── Serviços stateful locais (paridade de dev — em produção use Neon/Upstash) ─
# Em produção estes containers NÃO existem; substituídos por serviços gerenciados.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: agendai
      POSTGRES_PASSWORD: agendai
      POSTGRES_DB: agendai
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # Expõe na porta 5433 localmente para evitar conflito com Postgres do sistema
    ports:
      - "127.0.0.1:5433:5432"
    restart: unless-stopped
    networks:
      - agendai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agendai"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - agendai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── API Express ─────────────────────────────────────────────────────────────
  api:
    build: ./api
    # Sem porta pública — somente acessível internamente (via langgraph-server)
    environment:
      - PORT=3000
      - DATABASE_URL=postgres://agendai:agendai@postgres:5432/agendai
      - REDIS_URI=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agendai-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/horarios/disponiveis"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── LangGraph Server (Opção B) ───────────────────────────────────────────────
  # Imagem construída via: cd agent && langgraph build -t agendai-agent --no-pull
  # Sem porta pública — somente nginx acessa via rede interna.
  langgraph-server:
    image: agendai-agent:latest
    env_file: .env
    environment:
      # A imagem langchain/langgraph-api usa porta 3000 por padrão.
      # Movemos para 8123 para não colidir com a API Node (também em 3000).
      - PORT=8123
      - HOST=0.0.0.0
      # Postgres separado para checkpoints/threads do agente
      - DATABASE_URI=postgres://agendai:agendai@postgres:5432/agendai_lg
      - REDIS_URI=redis://redis:6379
      - API_BASE_URL=http://api:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agendai-network

  # ── Chat UI (Next.js) ────────────────────────────────────────────────────────
  # Sem porta pública — servida pelo nginx via location /
  agent-ui-pro:
    build:
      context: ./agent-ui-pro
      args:
        # Same-origin: browser usa /api como BFF proxy; usuário digita http://localhost:8080
        # no form e buildBffUrl() em Stream.tsx appenda /api automaticamente.
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_ASSISTANT_ID: agendai_agent
        NEXT_PUBLIC_LANGGRAPH_API_KEY: ""
    environment:
      # Runtime (server-side apenas) — usados pelo BFF Route Handler /app/api/[..._path]
      LANGGRAPH_API_URL: http://langgraph-server:8123
      LANGGRAPH_AUTH_TOKEN: ${LANGGRAPH_AUTH_TOKEN}
    depends_on:
      - langgraph-server
    restart: unless-stopped
    networks:
      - agendai-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── nginx — ÚNICO serviço com porta pública ──────────────────────────────────
  nginx:
    build: ./nginx
    ports:
      - "8080:8080"
    environment:
      - LANGGRAPH_AUTH_TOKEN=${LANGGRAPH_AUTH_TOKEN}
    depends_on:
      - agent-ui-pro
      - langgraph-server
    restart: unless-stopped
    networks:
      - agendai-network

volumes:
  postgres-data:

networks:
  agendai-network:
    driver: bridge

version: '3.8'

services:
  api:
    build: ./api
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=3000
      - DB_PATH=/app/data/clinica.db
    restart: unless-stopped
    networks:
      - agendai-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/horarios/disponiveis"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  n8n:
    image: n8nio/n8n:2.20.7
    ports:
      - "5678:5678"
    volumes:
      - ./n8n/data:/home/node/.n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-admin}
      - WEBHOOK_URL=http://localhost:5678/
      - API_BASE_URL=http://api:3000
    restart: unless-stopped
    networks:
      - agendai-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  agent:
    build: ./agent
    ports:
      - "8123:8123"
    env_file: .env
    environment:
      - API_BASE_URL=http://api:3000
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-AgendAI}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GMAIL_USER=${GMAIL_USER:-}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD:-}
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - agendai-network

  agent-ui:
    build: ./agent-ui
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8123
      - NEXT_PUBLIC_GRAPH_ID=agendai_agent
    depends_on:
      - agent
    restart: unless-stopped
    networks:
      - agendai-network

networks:
  agendai-network:
    driver: bridge
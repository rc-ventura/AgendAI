version: '3.8'

services:
  api:
    build: ./api
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=3000
      - DB_PATH=/app/data/clinica.db
    restart: unless-stopped
    networks:
      - agendai-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/horarios/disponiveis"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  agent:
    build: ./agent
    ports:
      - "8123:8123"
    env_file: .env
    environment:
      - API_BASE_URL=http://api:3000
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - agendai-network

  agent-ui:
    build: ./agent-ui
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8123
      - NEXT_PUBLIC_GRAPH_ID=agendai_agent
    depends_on:
      - agent
    restart: unless-stopped
    networks:
      - agendai-network

networks:
  agendai-network:
    driver: bridge
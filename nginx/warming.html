<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="8">
  <title>AgendAI — Iniciando...</title>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column;
           align-items: center; justify-content: center; height: 100vh;
           margin: 0; background: #f8fafc; color: #334155; }
    h2 { font-size: 1.4rem; margin-bottom: 0.5rem; }
    p  { font-size: 0.95rem; color: #64748b; }
    .spinner { width: 36px; height: 36px; border: 4px solid #e2e8f0;
               border-top-color: #6366f1; border-radius: 50%;
               animation: spin 0.8s linear infinite; margin-bottom: 1.5rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
